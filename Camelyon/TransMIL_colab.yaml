General:
    comment: Colab config for torchmil Google Drive dataset (paper hyperparameters, Hilbert replaces PPEG)
    seed: 2021
    fp16: True
    amp_level: O2
    precision: 16
    multi_gpu_mode: dp
    gpus: [0]
    epochs: 200
    grad_acc: 2
    frozen_bn: False
    patience: 10
    server: train
    log_path: logs/

Data:
    dataset_name: camel_data
    split_format: torchmil
    splits_csv: /content/drive/MyDrive/CPath_Research/CAMELYON16_Dataset/splits.csv
    data_dir: /content/drive/MyDrive/CPath_Research/CAMELYON16_Dataset/features_resnet50
    coords_dir: /content/drive/MyDrive/CPath_Research/CAMELYON16_Dataset/coords
    labels_dir: /content/drive/MyDrive/CPath_Research/CAMELYON16_Dataset/labels
    patch_size: 512
    val_ratio: 0.1
    split_seed: 2021
    data_shuffle: False
    feature_exts: ['.npy']
    fold: 0
    nfold: 4

    train_dataloader:
        batch_size: 1
        num_workers: 0

    test_dataloader:
        batch_size: 1
        num_workers: 0

Model:
    name: TransMIL
    n_classes: 2
    in_dim: 1024
    hidden_dim: 512
    patch_size: 512

Optimizer:
    opt: lookahead_radam
    lr: 0.0002
    opt_eps: null
    opt_betas: null
    momentum: null
    weight_decay: 0.00001

Loss:
    base_loss: CrossEntropyLoss
